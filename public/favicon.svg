<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Space background -->
  <rect width="64" height="64" rx="12" fill="#0a0e1a"/>

  <!-- Stars -->
  <circle cx="9"  cy="9"  r="1"   fill="#ffffff" opacity="0.55"/>
  <circle cx="55" cy="11" r="1.2" fill="#ffffff" opacity="0.45"/>
  <circle cx="11" cy="54" r="0.9" fill="#ffffff" opacity="0.5"/>
  <circle cx="57" cy="50" r="1"   fill="#ffffff" opacity="0.4"/>
  <circle cx="52" cy="55" r="0.7" fill="#ffffff" opacity="0.35"/>

  <!-- Mars planet -->
  <defs>
    <radialGradient id="mars" cx="38%" cy="35%" r="65%">
      <stop offset="0%"   stop-color="#e8622a"/>
      <stop offset="55%"  stop-color="#c1440e"/>
      <stop offset="100%" stop-color="#6b1f00"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="18" fill="url(#mars)"/>

  <!-- Surface detail -->
  <ellipse cx="26" cy="36" rx="5" ry="3"   fill="#a33800" opacity="0.45" transform="rotate(-20 26 36)"/>
  <ellipse cx="38" cy="27" rx="4" ry="2.5" fill="#a33800" opacity="0.35" transform="rotate(10 38 27)"/>

  <!-- North polar cap -->
  <ellipse cx="32" cy="15.5" rx="5.5" ry="2.5" fill="#f0e4d0" opacity="0.65"/>

  <!-- Orbital ring (cyan brand color) — back part -->
  <ellipse cx="32" cy="32" rx="27" ry="7.5" fill="none"
           stroke="#7fffd4" stroke-width="1.5" opacity="0.35"
           stroke-dasharray="47 38"/>

  <!-- Planet on top of back ring -->
  <circle cx="32" cy="32" r="18" fill="url(#mars)"/>
  <ellipse cx="32" cy="15.5" rx="5.5" ry="2.5" fill="#f0e4d0" opacity="0.65"/>
  <ellipse cx="26" cy="36" rx="5"   ry="3"   fill="#a33800" opacity="0.45" transform="rotate(-20 26 36)"/>
  <ellipse cx="38" cy="27" rx="4"   ry="2.5" fill="#a33800" opacity="0.35" transform="rotate(10 38 27)"/>

  <!-- Orbital ring — front part -->
  <ellipse cx="32" cy="32" rx="27" ry="7.5" fill="none"
           stroke="#7fffd4" stroke-width="1.5" opacity="0.9"
           stroke-dasharray="47 38" stroke-dashoffset="47"/>
</svg>
